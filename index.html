<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RACK C12 — Diagrama de Señal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap');
:root {
  --bg:#0a0e14; --panel:#111620; --panel2:#161e2c; --border:#1e2a3a;
  --accent:#00d4ff; --accent2:#ff6b35; --accent3:#a8ff3e; --accent4:#ffcc00;
  --muted:#3a4a5a; --text:#c8d8e8; --text-dim:#6a8a9a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}
header{display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:200;}
header h1{font-family:'Share Tech Mono',monospace;font-size:.95rem;color:var(--accent);letter-spacing:2px;flex:1;}
#backBtn{display:none;align-items:center;gap:8px;background:none;border:1px solid var(--border);color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:.72rem;padding:6px 14px;border-radius:4px;cursor:pointer;transition:all .2s;white-space:nowrap;}
#backBtn:hover{border-color:var(--accent);color:var(--accent);}
#backBtn.visible{display:flex;}
#breadcrumb{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#breadcrumb span{color:var(--accent);}
.loading{display:flex;align-items:center;justify-content:center;height:300px;font-family:'Share Tech Mono',monospace;color:var(--text-dim);font-size:.8rem;letter-spacing:2px;}
.error-msg{display:flex;align-items:center;justify-content:center;height:200px;font-family:'Share Tech Mono',monospace;color:#ff4444;font-size:.8rem;text-align:center;padding:20px;flex-direction:column;gap:8px;}

/* ── RACKS VIEW — columnas por letra ── */
#racksView{padding:24px;overflow-x:auto;}
.racks-columns{display:flex;gap:18px;align-items:flex-start;min-width:max-content;padding-bottom:16px;}
.rack-column{display:flex;flex-direction:column;gap:10px;width:168px;}
.rack-column-header{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:4px;color:var(--accent);text-transform:uppercase;padding:5px 4px;border-bottom:1px solid var(--accent);margin-bottom:2px;opacity:.7;}
.rack-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.rack-card-header{background:rgba(0,212,255,0.07);border-bottom:1px solid var(--border);padding:7px 11px;}
.rack-id{font-family:'Share Tech Mono',monospace;font-size:.78rem;color:var(--accent4);font-weight:bold;}
.rack-card-body{padding:7px 9px;display:flex;flex-direction:column;gap:4px;}
.eq-chip{font-size:.72rem;color:var(--text);background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:5px 9px;cursor:pointer;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.eq-chip:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,0.06);}

/* ── EQUIP VIEW ── */
#equipView{padding:24px;display:none;max-width:900px;}
.equip-title{font-family:'Share Tech Mono',monospace;font-size:1.05rem;color:var(--accent3);margin-bottom:3px;}
.equip-rack-label{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--accent4);margin-bottom:22px;}
.ports-section-title{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin:18px 0 10px;display:flex;align-items:center;gap:10px;}
.ports-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.ports-grid{display:flex;flex-wrap:wrap;gap:7px;}
.port-item{position:relative;display:flex;flex-direction:column;gap:3px;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px 12px;cursor:pointer;transition:all .15s;min-width:130px;max-width:210px;}
.port-item:hover{border-color:rgba(0,212,255,0.45);background:rgba(0,212,255,0.04);}
.port-item.active{border-color:var(--accent);background:rgba(0,212,255,0.08);}
.port-item.port-type-in {border-left:3px solid var(--accent);}
.port-item.port-type-out{border-left:3px solid var(--accent2);}
.port-item.port-type-aux{border-left:3px solid var(--accent3);}
.pi-port{font-family:'Share Tech Mono',monospace;font-size:.72rem;font-weight:bold;color:var(--text);}
.pi-label{font-size:.64rem;color:var(--accent3);font-family:'Share Tech Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi-peer{font-size:.61rem;color:var(--text-dim);margin-top:1px;}

/* ── POPOVER ── */
#popover{position:fixed;z-index:500;background:var(--panel2);border:1px solid var(--accent);border-radius:8px;padding:14px 16px;width:300px;box-shadow:0 8px 32px rgba(0,0,0,.75);display:none;}
#popover.visible{display:block;}
#popover-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.85rem;line-height:1;padding:2px 4px;}
#popover-close:hover{color:var(--accent);}
.pop-title{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--accent);letter-spacing:2px;margin-bottom:10px;}
.path-node{display:flex;align-items:flex-start;gap:6px;padding:2px 0;flex-wrap:wrap;}
.path-node.pn-first .pn-eq{color:var(--accent3);}
.path-node.pn-last  .pn-eq{color:var(--accent2);}
.path-node.pn-active{background:rgba(0,212,255,0.1);border-radius:3px;padding:2px 4px;margin:0 -4px;}
.pn-pre {color:var(--muted);flex-shrink:0;width:10px;font-family:'Share Tech Mono',monospace;font-size:.68rem;}
.pn-rack{color:var(--accent4);flex-shrink:0;min-width:38px;font-family:'Share Tech Mono',monospace;font-size:.63rem;}
.pn-eq  {color:var(--text);font-size:.7rem;}
.pn-port{color:var(--accent);font-size:.6rem;font-family:'Share Tech Mono',monospace;}
.pn-note{color:var(--text-dim);font-size:.57rem;font-style:italic;width:100%;padding-left:16px;}
.path-arr   {color:var(--muted);padding-left:4px;font-size:.68rem;line-height:1.3;}
.path-branch{color:var(--accent3);font-size:.57rem;margin:3px 0 1px;font-family:'Share Tech Mono',monospace;}
.path-nodata{color:var(--muted);font-style:italic;font-size:.68rem;}
</style>
</head>
<body>
<header>
  <button id="backBtn" onclick="showRacks()">← Volver</button>
  <h1 id="headerTitle">◈ RACK C12 — DIAGRAMA DE SEÑAL</h1>
  <span id="breadcrumb"></span>
</header>

<div id="racksView"><div class="loading">▸ CARGANDO DATOS...</div></div>
<div id="equipView"></div>

<div id="popover">
  <button id="popover-close" onclick="closePopover()">✕</button>
  <div class="pop-title">▶ RUTA DE SEÑAL</div>
  <div id="popover-body"></div>
</div>

<script>
// ── Normalizar ───────────────────────────────────────────────────────────────
function normEq(eq){
  if(!eq)return'';
  eq=String(eq);
  return eq
    .replace(/^Player A$/i,'PLAYER A').replace(/^Player B$/i,'PLAYER B').replace(/^Player C$/i,'PLAYER C')
    .replace(/^Loop A$/i,'LOOP A').replace(/^Loop B$/i,'LOOP B').replace(/^Loop C$/i,'LOOP C')
    .replace(/^Aja fs4$/i,'AJA FS4')
    .replace(/Blackmagic 12 x 12/i,'Blackmagic 12x12')
    .replace(/Blackmagic Multiview 16/i,'Blackmagic MultiView 16')
    .replace(/Blackmagic MultiView$/i,'Blackmagic MultiView 16')
    .replace(/^openGear X Slot \d+.*$/,'openGear X')
    .replace(/^Patch Panel \(Inputs\)$/,'Patch Panel')
    .replace(/^Patch Panel \(Outputs\)$/,'Patch Panel')
    .replace(/^Vacante en Rack$/i,'VACANTE')
    .trim();
}
function normRack(r){
  if(!r)return'';
  return String(r).replace(/^D\.CAM\.$/,'D.CAM').trim();
}
function esc(s){
  return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}
function portTypeClass(p){
  const l=String(p||'').toLowerCase();
  if(l.startsWith('in')||l.includes(' in '))return'port-type-in';
  if(l.startsWith('out')||l.includes(' out '))return'port-type-out';
  return'port-type-aux';
}

let RAW=[], graph={};

fetch('connections.json')
  .then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status} — ${r.url}`);return r.json();})
  .then(data=>{
    RAW=data.map(c=>({
      src_rack:normRack(c.src_rack), src_eq:normEq(c.src_eq), src_port:String(c.src_port||''),
      dst_rack:normRack(c.dst_rack), dst_eq:normEq(c.dst_eq), dst_port:String(c.dst_port||''),
      label:String(c.label||''), notes:String(c.notes||'')
    })).filter(c=>
      c.src_rack&&c.dst_rack&&
      !['?','N/C'].includes(c.src_rack)&&
      !['?','N/C','VACANTE'].includes(c.dst_rack)&&
      c.src_eq!=='VACANTE'
    );
    buildGraph();
    showRacks();
  })
  .catch(err=>{
    document.getElementById('racksView').innerHTML=
      `<div class="error-msg"><div>✗ No se pudo cargar connections.json</div><small>${err.message}</small></div>`;
  });

// ── Graph ────────────────────────────────────────────────────────────────────
function nk(r,e,p){return`${String(r||'').toLowerCase()}||${String(e||'').toLowerCase()}||${String(p||'').toLowerCase()}`;}
function portNum(p){const m=String(p||'').match(/\d+/);return m?parseInt(m[0]):null;}

function buildGraph(){
  graph={};
  function addEdge(sr,se,sp,dr,de,dp,notes){
    const k=nk(sr,se,sp);
    if(!graph[k])graph[k]=[];
    graph[k].push({rack:dr,eq:de,port:dp,notes:notes||''});
  }
  RAW.forEach(c=>addEdge(c.src_rack,c.src_eq,c.src_port,c.dst_rack,c.dst_eq,c.dst_port,c.notes));
  const TRANS=['blackmagic multiview 16','blackmagic 12x12','patch panel'];
  const isTrans=eq=>TRANS.some(t=>String(eq||'').toLowerCase().includes(t));
  const arrivals={},departures={};
  RAW.forEach(c=>{
    if(isTrans(c.dst_eq)){const n=portNum(c.dst_port);if(n!=null)arrivals[nk(c.dst_rack,c.dst_eq,n)]={rack:c.dst_rack,eq:c.dst_eq,port:c.dst_port,notes:c.notes};}
    if(isTrans(c.src_eq)){const n=portNum(c.src_port);if(n!=null){const k=nk(c.src_rack,c.src_eq,n);if(!departures[k])departures[k]=[];departures[k].push({rack:c.dst_rack,eq:c.dst_eq,port:c.dst_port,notes:c.notes});}}
  });
  Object.entries(arrivals).forEach(([k,arr])=>{
    (departures[k]||[]).forEach(dep=>addEdge(arr.rack,arr.eq,arr.port,dep.rack,dep.eq,dep.port,`[via ${arr.eq} p${portNum(arr.port)}] ${dep.notes}`.trim()));
  });
}

function traceFrom(rack,eq,port,maxD=10){
  const start={rack,eq,port,notes:''};
  const paths=[];
  function dfs(r,e,p,chain,vis,d){
    if(d>maxD)return;
    const k=nk(r,e,p);
    if(vis.has(k))return;
    vis.add(k);
    const nx=graph[k]||[];
    if(!nx.length)paths.push([...chain]);
    else nx.forEach(n=>{chain.push(n);dfs(n.rack,n.eq,n.port,chain,new Set(vis),d+1);chain.pop();});
  }
  dfs(rack,eq,port,[start],new Set(),0);
  if(!paths.length)paths.push([start]);
  return paths;
}

// ── Signal path HTML ─────────────────────────────────────────────────────────
function pathHTML(paths,activeRack,activeEq,activePort){
  const ak=nk(activeRack,activeEq,activePort);
  const seen=new Set();
  const uniq=paths.filter(p=>{const k=p.map(n=>nk(n.rack,n.eq,n.port)).join('>');if(seen.has(k))return false;seen.add(k);return true;});
  if(uniq.length===1&&uniq[0].length===1)return`<div class="path-nodata">Sin ruta documentada desde este punto</div>`;
  let html='';
  uniq.forEach((chain,pi)=>{
    if(uniq.length>1)html+=`<div class="path-branch">╠ Rama ${pi+1}</div>`;
    chain.forEach((node,i)=>{
      const isFirst=i===0,isLast=i===chain.length-1,isActive=nk(node.rack,node.eq,node.port)===ak;
      const pre=isFirst?'◉':isLast?'◎':'│';
      html+=(i>0?`<div class="path-arr">↓</div>`:'')+
        `<div class="path-node ${isFirst?'pn-first':''} ${isLast?'pn-last':''} ${isActive?'pn-active':''}">
          <span class="pn-pre">${pre}</span>
          <span class="pn-rack">${node.rack||'?'}</span>
          <span class="pn-eq">${node.eq}</span>
          <span class="pn-port"> ${node.port}</span>
          ${node.notes?`<div class="pn-note">${node.notes}</div>`:''}
        </div>`;
    });
  });
  return html;
}

// ── Popover ──────────────────────────────────────────────────────────────────
let activePortEl=null;

function showPopover(el,sr,se,sp){
  if(activePortEl===el){closePopover();return;}
  if(activePortEl)activePortEl.classList.remove('active');
  activePortEl=el;
  el.classList.add('active');
  document.getElementById('popover-body').innerHTML=pathHTML(traceFrom(sr,se,sp),sr,se,sp);
  const pop=document.getElementById('popover');
  pop.classList.add('visible');
  // Posicionar al lado del elemento
  const rect=el.getBoundingClientRect();
  const pw=300,ph=pop.scrollHeight||200;
  const vw=window.innerWidth,vh=window.innerHeight;
  let left=rect.right+12;
  let top=rect.top;
  if(left+pw>vw-8)left=rect.left-pw-12;
  if(left<8)left=8;
  if(top+ph>vh-8)top=Math.max(8,vh-ph-8);
  pop.style.left=left+'px';
  pop.style.top=top+'px';
}

function closePopover(){
  document.getElementById('popover').classList.remove('visible');
  if(activePortEl){activePortEl.classList.remove('active');activePortEl=null;}
}

document.addEventListener('click',e=>{
  if(!document.getElementById('popover').contains(e.target)&&!e.target.closest('.port-item'))
    closePopover();
});

// ── Racks agrupados por letra ─────────────────────────────────────────────────
function getRacksByLetter(){
  const map={};
  RAW.forEach(c=>{
    [[c.src_rack,c.src_eq],[c.dst_rack,c.dst_eq]].forEach(([rack,eq])=>{
      if(!rack||['?','N/C'].includes(rack))return;
      if(!eq||eq==='VACANTE')return;
      if(!map[rack])map[rack]={};
      map[rack][eq]=true;
    });
  });
  const byLetter={};
  Object.entries(map).forEach(([rack,eqs])=>{
    const letter=(rack.match(/^([A-Za-z]+)/)||[,'?'])[1].toUpperCase();
    if(!byLetter[letter])byLetter[letter]=[];
    byLetter[letter].push({rack,eqs:Object.keys(eqs).sort()});
  });
  Object.values(byLetter).forEach(arr=>arr.sort((a,b)=>a.rack.localeCompare(b.rack,undefined,{numeric:true})));
  return Object.entries(byLetter).sort(([a],[b])=>a.localeCompare(b));
}

// ── Vista racks ──────────────────────────────────────────────────────────────
function showRacks(){
  closePopover();
  document.getElementById('backBtn').classList.remove('visible');
  document.getElementById('breadcrumb').innerHTML='';
  document.getElementById('headerTitle').textContent='◈ RACK C12 — DIAGRAMA DE SEÑAL';
  document.getElementById('equipView').style.display='none';
  const view=document.getElementById('racksView');
  view.style.display='block';
  const groups=getRacksByLetter();
  let html='<div class="racks-columns">';
  groups.forEach(([letter,racks])=>{
    html+=`<div class="rack-column"><div class="rack-column-header">${letter}</div>`;
    racks.forEach(({rack,eqs})=>{
      html+=`<div class="rack-card"><div class="rack-card-header"><span class="rack-id">RACK ${rack}</span></div><div class="rack-card-body">`;
      eqs.forEach(eq=>{
        html+=`<div class="eq-chip" onclick="showEquip('${esc(rack)}','${esc(eq)}')">${eq}</div>`;
      });
      html+='</div></div>';
    });
    html+='</div>';
  });
  html+='</div>';
  view.innerHTML=html;
}

// ── Vista equipo ─────────────────────────────────────────────────────────────
function showEquip(rack,eq){
  closePopover();
  document.getElementById('backBtn').classList.add('visible');
  document.getElementById('breadcrumb').innerHTML=`RACK <span>${rack}</span> › ${eq}`;
  document.getElementById('headerTitle').textContent='';
  document.getElementById('racksView').style.display='none';

  const outConns=RAW.filter(c=>c.src_rack===rack&&c.src_eq===eq);
  const inConns =RAW.filter(c=>c.dst_rack===rack&&c.dst_eq===eq);

  let html=`<div class="equip-title">${eq}</div><div class="equip-rack-label">RACK ${rack}</div>`;

  if(outConns.length){
    html+=`<div class="ports-section-title">◆ SALIDAS</div><div class="ports-grid">`;
    outConns.forEach(c=>{
      const peer=c.dst_eq?`→ ${c.dst_rack} · ${c.dst_eq}`:'';
      html+=`<div class="port-item ${portTypeClass(c.src_port)}" onclick="showPopover(this,'${esc(c.src_rack)}','${esc(c.src_eq)}','${esc(c.src_port)}')">
        <div class="pi-port">${c.src_port||'—'}</div>
        ${c.label?`<div class="pi-label">${c.label}</div>`:''}
        ${peer?`<div class="pi-peer">${peer}</div>`:''}
      </div>`;
    });
    html+='</div>';
  }

  if(inConns.length){
    html+=`<div class="ports-section-title">◆ ENTRADAS</div><div class="ports-grid">`;
    inConns.forEach(c=>{
      const peer=c.src_eq?`← ${c.src_rack} · ${c.src_eq}`:'';
      html+=`<div class="port-item ${portTypeClass(c.dst_port)}" onclick="showPopover(this,'${esc(c.src_rack)}','${esc(c.src_eq)}','${esc(c.src_port)}')">
        <div class="pi-port">${c.dst_port||'—'}</div>
        ${c.label?`<div class="pi-label">${c.label}</div>`:''}
        ${peer?`<div class="pi-peer">${peer}</div>`:''}
      </div>`;
    });
    html+='</div>';
  }

  if(!outConns.length&&!inConns.length)
    html+=`<div style="color:var(--text-dim);font-style:italic;margin-top:20px;font-size:.85rem;">Sin conexiones documentadas para este equipo.</div>`;

  const view=document.getElementById('equipView');
  view.innerHTML=html;
  view.style.display='block';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
