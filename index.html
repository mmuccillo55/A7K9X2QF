<body>

<header>
  <button id="backBtn" onclick="showRacks()">← Volver</button>
  <h1 id="headerTitle">◈ RACK C12 — DIAGRAMA DE SEÑAL</h1>
  <span id="breadcrumb"></span>
</header>

<div id="racksView"><div class="loading">▸ CARGANDO DATOS...</div></div>
<div id="equipView"></div>

<script>

// ─────────────────────────────
// 🛡 SAFE HELPERS (NUEVO)
// ─────────────────────────────
function s(v){
  if (v === null || v === undefined) return '';
  return String(v);
}
function sl(v){
  return s(v).toLowerCase();
}

// ─────────────────────────────
// NORMALIZADORES (tu código)
// ─────────────────────────────
function normEq(eq) {
  return s(eq)
    .replace(/^Player A$/i, 'PLAYER A')
    .replace(/^Player B$/i, 'PLAYER B')
    .replace(/^Player C$/i, 'PLAYER C')
    .replace(/^Loop A$/i,   'LOOP A')
    .replace(/^Loop B$/i,   'LOOP B')
    .replace(/^Loop C$/i,   'LOOP C')
    .replace(/^Aja fs4$/i,  'AJA FS4')
    .trim();
}

function normRack(r) {
  return s(r).replace(/^D\.CAM\.$/, 'D.CAM').trim();
}

let RAW = [];
let graph = {};

// ─────────────────────────────
// 🔥 FETCH (FIX CACHE + STRING)
// ─────────────────────────────
fetch('connections.json?v=' + Date.now())
  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
  .then(data => {

    RAW = data.map(c => ({
      src_rack: normRack(s(c.src_rack)),
      src_eq: normEq(s(c.src_eq)),
      src_port: s(c.src_port),

      dst_rack: normRack(s(c.dst_rack)),
      dst_eq: normEq(s(c.dst_eq)),
      dst_port: s(c.dst_port),

      label: s(c.label),
      notes: s(c.notes)
    }));

    buildGraph();
    showRacks();
  })
  .catch(err => {
    console.error(err);
    document.getElementById('racksView').innerHTML =
      `<div class="error-msg">
        <div>✗ No se pudo cargar connections.json</div>
        <small>${s(err.message)}</small>
      </div>`;
  });

// ─────────────────────────────
// 🔧 FIXES CRÍTICOS
// ─────────────────────────────
function nk(r,e,p){
  return `${sl(r)}||${sl(e)}||${sl(p)}`;
}

function portNum(p){
  const m = s(p).match(/\d+/);
  return m ? parseInt(m[0]) : null;
}

function pb(p){
  if(p === '' || p === null || p === undefined) return '';
  const l = sl(p);

  const cls =
    l.startsWith('in') || l.includes(' in ')
      ? 'port-in'
      : l.startsWith('out') || l.includes(' out ')
      ? 'port-out'
      : 'port-aux';

  return `<span class="port-badge ${cls}">${s(p)}</span>`;
}

// ─────────────────────────────
// RESTO DE TU CÓDIGO

</script>
