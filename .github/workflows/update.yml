name: Actualizar conexiones

on:
  push:
    paths:
      - 'RACKS_C12.xlsx'

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: pip install pandas openpyxl

      - name: Parsear xlsx → connections.json
        run: python parse.py

      - name: Commitear connections.json actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add connections.json
          git diff --staged --quiet || git commit -m "auto: actualizar connections.json"
          git push
